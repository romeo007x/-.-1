```html
<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>เข้าสู่ระบบ CMS</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>

body{
    font-family:'Be Vietnam Pro',sans-serif;
}

.glass-effect{
    backdrop-filter:blur(16px);
    background:rgba(255,255,255,.85);
}

</style>

</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

<div class="glass-effect w-full max-w-md rounded-3xl shadow-2xl overflow-hidden border border-white/40">

    <!-- TOP -->

    <div class="bg-[#005570] text-white text-center p-10">

        <div class="w-20 h-20 mx-auto rounded-full bg-white flex items-center justify-center mb-5">

            <span class="material-symbols-outlined text-[#005570] text-5xl">
                medical_services
            </span>

        </div>

        <h1 class="text-2xl font-bold mb-2">
            โรงพยาบาลสมเด็จพระยุพราชหล่มเก่า
        </h1>

        <p class="text-sm tracking-[3px] uppercase text-slate-200">
            CMS ADMIN
        </p>

    </div>

    <!-- FORM -->

    <div class="p-8">

        <form id="loginForm" class="space-y-5">

            <!-- USERNAME -->

            <div>

                <label class="block mb-2 font-semibold">
                    Username
                </label>

                <input
                    id="username"
                    type="text"
                    required
                    class="w-full border rounded-2xl px-4 py-3 outline-none focus:ring-2 focus:ring-[#005570]"
                    placeholder="กรอกชื่อผู้ใช้">

            </div>

            <!-- PASSWORD -->

            <div>

                <label class="block mb-2 font-semibold">
                    Password
                </label>

                <div class="relative">

                    <input
                        id="password"
                        type="password"
                        required
                        class="w-full border rounded-2xl px-4 py-3 outline-none focus:ring-2 focus:ring-[#005570]"
                        placeholder="กรอกรหัสผ่าน">

                    <button
                        type="button"
                        onclick="togglePassword()"
                        class="absolute right-4 top-1/2 -translate-y-1/2">

                        <span
                            id="password-toggle-icon"
                            class="material-symbols-outlined">

                            visibility

                        </span>

                    </button>

                </div>

            </div>

            <!-- REMEMBER -->

            <label class="flex items-center gap-3">

                <input type="checkbox">

                <span class="text-sm">
                    จดจำการเข้าสู่ระบบ
                </span>

            </label>

            <!-- BUTTON -->

            <button
                type="submit"
                class="w-full bg-[#005570] hover:bg-[#00384b]
                text-white py-4 rounded-2xl font-bold
                shadow-lg transition">

                เข้าสู่ระบบ

            </button>

        </form>

    </div>

</div>

<script>

/* =========================
   SHOW / HIDE PASSWORD
========================= */

function togglePassword(){

    const passwordInput =
    document.getElementById("password");

    const icon =
    document.getElementById("password-toggle-icon");

    if(passwordInput.type === "password"){

        passwordInput.type = "text";

        icon.textContent =
        "visibility_off";

    }else{

        passwordInput.type = "password";

        icon.textContent =
        "visibility";

    }

}

/* =========================
   LOGIN
========================= */

document
.getElementById("loginForm")
.addEventListener("submit",function(e){

    e.preventDefault();

    const username =
    document.getElementById("username").value;

    const password =
    document.getElementById("password").value;

    /* ===== LOGIN ===== */

    if(
        username === "admin" &&
        password === "1234"
    ){

        localStorage.setItem(
            "isAdmin",
            "true"
        );

        alert("เข้าสู่ระบบสำเร็จ");

        window.location.href =
        "admin.html";

    }else{

        alert(
        "ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง"
        );

    }

});

</script>

</body>
</html>
```
