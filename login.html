<script>
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('password-toggle-icon');

        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.textContent = 'visibility_off';
        } else {
            passwordInput.type = 'password';
            toggleIcon.textContent = 'visibility';
        }
    }

    document.addEventListener('DOMContentLoaded', function () {

        document.getElementById('loginForm').addEventListener('submit', function(e) {

            e.preventDefault();

            const btn = this.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            btn.disabled = true;

            btn.innerHTML = `
                <span class="material-symbols-outlined animate-spin">progress_activity</span>
                <span>กำลังเข้าสู่ระบบ...</span>
            `;

            setTimeout(() => {

                // USER / PASS
                if(username === "admin" && password === "1234") {

                    window.location.href = "admin.html";

                } else {

                    alert("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง");

                    btn.innerHTML = originalContent;
                    btn.disabled = false;
                }

            }, 1000);
        });

        // เอฟเฟกต์เมาส์
        document.addEventListener('mousemove', (e) => {

            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;

            const glass = document.querySelector('.glass-effect');

            if(glass){
                glass.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }

        });

    });
</script>

<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('password-toggle-icon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = 'visibility';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            // Micro-interaction simulation
            btn.disabled = true;
            btn.innerHTML = `
                <span class="material-symbols-outlined animate-spin">progress_activity</span>
                <span>กำลังเข้าสู่ระบบ...</span>
            `;
            
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.disabled = false;
                // Add your login logic here
            }, 1500);
        });

        // Atmospheric effect: Subtle mouse movement shift
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            document.querySelector('.glass-effect').style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    </script>
